name: Update daily briefings with OpenAI

on:
  workflow_dispatch:
    inputs:
      replace_today:
        description: 'Replace existing rows for today if present'
        required: false
        default: 'true'
      dry_run:
        description: 'Generate but do not commit'
        required: false
        default: 'false'
  schedule:
    - cron: '20 23 * * 0-4'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-briefings:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate daily briefing CSV rows
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          REPLACE_TODAY: ${{ github.event.inputs.replace_today || 'true' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: npm run update-briefings

      - name: Validate CSV data
        run: npm run validate

      - name: Commit briefing update
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update daily briefing'
          file_pattern: data/briefings.csv data/sources.json

      - name: Build static site
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm run build

      - name: Setup Pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4
